<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Lab 6.1 - ระบบแปลงหน่วย (switch-case)</title>
<style>
  body{font-family:'Sarabun',sans-serif; background:#f4f6f9; padding:20px;}
  .box{max-width:420px; margin:auto; background:#fff; padding:24px; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,.1);}
  h1{font-size:20px; color:#2f4c8f;}
  label{display:block; margin-top:12px; font-size:14px;}
  input, select{width:100%; padding:8px; margin-top:4px; border:1px solid #ccc; border-radius:4px;}
  button{margin-top:16px; padding:10px 16px; background:#2f4c8f; color:#fff; border:none; border-radius:4px; cursor:pointer;}
  #result{margin-top:16px; background:#f8f9fc; padding:14px; border-radius:6px; font-size:15px; font-weight:bold;}
</style>
</head>
<body>
<div class="box">
  <h1>Lab 6.1: ระบบแปลงหน่วย</h1>
  <label>ประเภทการแปลง</label>
  <select id="convertType">
    <option value="kgToLb">กิโลกรัม → ปอนด์</option>
    <option value="cToF">เซลเซียส → ฟาเรนไฮต์</option>
    <option value="kmToMile">กิโลเมตร → ไมล์</option>
  </select>
  <label>ค่าที่ต้องการแปลง</label>
  <input type="number" id="inputValue" placeholder="กรอกตัวเลข">
  <button onclick="convert()">แปลงหน่วย</button>
  <div id="result"></div>
</div>

<script>
function convert() {
  let type = document.getElementById("convertType").value;
  let value = parseFloat(document.getElementById("inputValue").value);
  let result = 0;
  const resultBox = document.getElementById("result");

  if (isNaN(value)) {
    resultBox.innerText = "กรุณากรอกตัวเลข";
    return;
  }

  switch (type) {
    case "kgToLb":
      result = value * 2.20462;
      resultBox.innerText = `${value} กิโลกรัม = ${result.toFixed(2)} ปอนด์`;
      break;
    case "cToF":
      result = (value * 9 / 5) + 32;
      resultBox.innerText = `${value} องศาเซลเซียส = ${result.toFixed(2)} องศาฟาเรนไฮต์`;
      break;
    case "kmToMile":
      result = value * 0.621371;
      resultBox.innerText = `${value} กิโลเมตร = ${result.toFixed(2)} ไมล์`;
      break;
    default:
      resultBox.innerText = "กรุณาเลือกประเภทการแปลง";
  }
}
</script>
</body>
</html>
