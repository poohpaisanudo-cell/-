<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Lab 5.2 - คำนวณค่าส่ง (Dropdown)</title>
<style>
  body{font-family:'Sarabun',sans-serif; background:#f4f6f9; padding:20px;}
  .box{max-width:420px; margin:auto; background:#fff; padding:24px; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,.1);}
  h1{font-size:20px; color:#2f4c8f;}
  label{display:block; margin-top:12px; font-size:14px;}
  input, select{width:100%; padding:8px; margin-top:4px; border:1px solid #ccc; border-radius:4px;}
  button{margin-top:16px; padding:10px 16px; background:#2f4c8f; color:#fff; border:none; border-radius:4px; cursor:pointer;}
  #result{margin-top:16px; background:#f8f9fc; padding:14px; border-radius:6px; font-size:14px;}
</style>
</head>
<body>
<div class="box">
  <h1>Lab 5.2: ระบบคำนวณค่าส่ง</h1>
  <label>ราคาสินค้า (บาท)</label>
  <input type="number" id="price" placeholder="เช่น 450">
  <label>รูปแบบการจัดส่ง</label>
  <select id="shipping">
    <option value="50">EMS (50 บาท)</option>
    <option value="30">ลงทะเบียน (30 บาท)</option>
    <option value="15">ธรรมดา (15 บาท)</option>
  </select>
  <button onclick="calculateShipping()">คำนวณ</button>
  <div id="result"></div>
</div>

<script>
function calculateShipping() {
  const price = parseFloat(document.getElementById("price").value);
  if (isNaN(price) || price <= 0) {
    document.getElementById("result").innerHTML = "<b style='color:#b00020'>กรุณากรอกราคาสินค้าให้ถูกต้อง</b>";
    return;
  }

  let shippingCost = parseFloat(document.getElementById("shipping").value);

  // เงื่อนไขพิเศษ: ซื้อครบ 500 ค่าส่งฟรี
  if (price >= 500) {
    shippingCost = 0;
  }

  const total = price + shippingCost;

  document.getElementById("result").innerHTML = `
    <p>ราคาสินค้า: ${price.toFixed(2)} บาท</p>
    <p>ค่าจัดส่ง: ${shippingCost === 0 ? "ฟรี (ซื้อครบ 500 บาท)" : shippingCost.toFixed(2) + " บาท"}</p>
    <p><strong>ยอดรวมทั้งสิ้น: ${total.toFixed(2)} บาท</strong></p>
  `;
}
</script>
</body>
</html>
