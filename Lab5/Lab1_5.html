<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Lab 1.5 - บันทึกข้อมูลลง localStorage</title>
<style>
  body{font-family:'Sarabun',sans-serif; background:#f4f6f9; padding:20px;}
  .box{max-width:460px; margin:auto; background:#fff; padding:24px; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,.1);}
  h1{font-size:20px; color:#2f4c8f;}
  h2{font-size:16px; color:#333; margin-top:24px;}
  label{display:block; margin-top:12px; font-size:14px;}
  input{width:100%; padding:8px; margin-top:4px; border:1px solid #ccc; border-radius:4px;}
  button{margin-top:14px; padding:10px 16px; background:#2f4c8f; color:#fff; border:none; border-radius:4px; cursor:pointer;}
  button.danger{background:#b00020;}
  ul{list-style:none; padding:0;}
  li{background:#f8f9fc; margin-bottom:6px; padding:8px 10px; border-radius:4px; display:flex; justify-content:space-between; align-items:center;}
  li button{margin:0; padding:4px 8px; font-size:12px;}
  #msg{margin-top:10px; font-size:13px; color:#1a7a2e; white-space:pre-line;}
</style>
</head>
<body>
<div class="box">
  <h1>Lab 1.5: บันทึกข้อมูลลง localStorage</h1>
  <form id="regForm" onsubmit="return validateForm(event)">
    <label>ชื่อ-นามสกุล</label>
    <input type="text" id="name">
    <label>อีเมล</label>
    <input type="text" id="email">
    <label>เบอร์โทร</label>
    <input type="text" id="phone">
    <label>รหัสผ่าน</label>
    <input type="password" id="password">
    <button type="submit">สมัครสมาชิกและบันทึก</button>
  </form>
  <div id="msg"></div>

  <h2>รายชื่อผู้สมัคร (จาก localStorage)</h2>
  <ul id="userList"></ul>
  <button class="danger" onclick="clearData()">ล้างข้อมูลทั้งหมด</button>
</div>

<script>
function validateForm(e){
  e.preventDefault();
  let name = document.getElementById("name").value.trim();
  let email = document.getElementById("email").value.trim();
  let phone = document.getElementById("phone").value.trim();
  let password = document.getElementById("password").value;
  let errors = [];

  if(name === "") errors.push("กรุณากรอกชื่อ-นามสกุล");
  if(email === "" || !email.includes("@")) errors.push("กรุณากรอกอีเมลให้ถูกต้อง");
  if(phone === "" || phone.length < 9 || isNaN(phone)) errors.push("กรุณากรอกเบอร์โทร 9-10 หลัก");
  if(password.length < 6) errors.push("รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร");

  const msgBox = document.getElementById("msg");
  if(errors.length > 0){
    msgBox.style.color = "#b00020";
    msgBox.innerText = errors.join("\n");
    return false;
  }

  saveToLocalStorage({ name, email, phone, password });
  msgBox.style.color = "#1a7a2e";
  msgBox.innerText = "บันทึกข้อมูลสำเร็จ!";
  document.getElementById("regForm").reset();
  return false;
}

function saveToLocalStorage(userData){
  let users = JSON.parse(localStorage.getItem("users")) || [];
  users.push(userData);
  localStorage.setItem("users", JSON.stringify(users));
  displayUsers();
}

function displayUsers(){
  let users = JSON.parse(localStorage.getItem("users")) || [];
  let html = "";
  users.forEach((user, index) => {
    html += `<li><span>${index+1}. ${user.name} — ${user.email}</span>
              <button onclick="deleteUser(${index})">ลบ</button></li>`;
  });
  document.getElementById("userList").innerHTML = html || "<li>ยังไม่มีข้อมูล</li>";
}

function deleteUser(index){
  let users = JSON.parse(localStorage.getItem("users")) || [];
  users.splice(index, 1);
  localStorage.setItem("users", JSON.stringify(users));
  displayUsers();
}

function clearData(){
  localStorage.removeItem("users");
  displayUsers();
  document.getElementById("msg").innerText = "ล้างข้อมูลทั้งหมดแล้ว";
}

displayUsers();
</script>
</body>
</html>
