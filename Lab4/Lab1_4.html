<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 1_4: ฟอร์มสมัครสมาชิก</title>
</head>
<body>

    <h2>ฟอร์มสมัครสมาชิก</h2>
    <form id="registerForm" onsubmit="return validateForm()">
        <div class="form-group">
            <label for="name">ชื่อ:</label>
            <input type="text" id="name" name="name">
        </div>
        
        <div class="form-group">
            <label for="email">อีเมล:</label>
            <input type="text" id="email" name="email">
        </div>
        
        <div class="form-group">
            <label for="phone">เบอร์โทร:</label>
            <input type="text" id="phone" name="phone">
        </div>
        
        <div class="form-group">
            <label for="password">รหัสผ่าน:</label>
            <input type="password" id="password" name="password">
        </div>
        
        <button type="submit">สมัครสมาชิก</button>
    </form>
    <script>
        function validateForm() {
    let name = document.getElementById("name").value.trim();
    let email = document.getElementById("email").value.trim();
    let phone = document.getElementById("phone").value.trim();
    let password = document.getElementById("password").value;
    let errors = [];

    if (name === "") errors.push("Please enter your name");
    if (email === "" || !email.includes("@")) errors.push("Please enter a valid email address");
    if (phone === "" || phone.length < 9 || isNaN(phone)) errors.push("Please enter a valid 10-digit phone number");
    if (password.length < 6) errors.push("Password must be at least 6 characters long");

    if (errors.length > 0) {
        alert(errors.join("\n"));
        return false;
    }
    alert("Registration successful!");
    return true;
}
    </script>

</body>
</html>
