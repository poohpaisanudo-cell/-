<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 1_4: ฟอร์มสมัครสมาชิก</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #fdf2f8, #eef2ff);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        form {
            background: white;
            padding: 28px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 420px;
        }
        h2 {
            text-align: center;
            color: #7c3aed;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 14px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            color: #4b5563;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            box-sizing: border-box;
            transition: 0.2s ease;
        }
        input:focus {
            outline: none;
            border-color: #8b5cf6;
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.15);
        }
        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(90deg, #8b5cf6, #ec4899);
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 8px;
        }
        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 14px rgba(139, 92, 246, 0.2);
        }
    </style>
</head>
<body>

    <form id="registerForm" onsubmit="return validateForm()">
        <h2>ฟอร์มสมัครสมาชิก</h2>
    <form id="registerForm" onsubmit="return validateForm()">
        <div class="form-group">
            <label for="name">ชื่อ:</label>
            <input type="text" id="name" name="name">
        </div>
        
        <div class="form-group">
            <label for="email">อีเมล:</label>
            <input type="text" id="email" name="email">
        </div>
        
        <div class="form-group">
            <label for="phone">เบอร์โทร:</label>
            <input type="text" id="phone" name="phone">
        </div>
        
        <div class="form-group">
            <label for="password">รหัสผ่าน:</label>
            <input type="password" id="password" name="password">
        </div>
        
        <button type="submit">สมัครสมาชิก</button>
    </form>
    <script>
        function validateForm() {
    let name = document.getElementById("name").value.trim();
    let email = document.getElementById("email").value.trim();
    let phone = document.getElementById("phone").value.trim();
    let password = document.getElementById("password").value;
    let errors = [];

    if (name === "") errors.push("Please enter your name");
    if (email === "" || !email.includes("@")) errors.push("Please enter a valid email address");
    if (phone === "" || phone.length < 9 || isNaN(phone)) errors.push("Please enter a valid 10-digit phone number");
    if (password.length < 6) errors.push("Password must be at least 6 characters long");

    if (errors.length > 0) {
        alert(errors.join("\n"));
        return false;
    }
    alert("Registration successful!");
    return true;
}
    </script>

</body>
</html>
