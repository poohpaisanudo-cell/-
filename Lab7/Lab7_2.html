<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Lab 7.2 - JSON Import/Export</title>
<style>
  body{font-family:'Sarabun',sans-serif; background:#f4f6f9; padding:20px;}
  .box{max-width:560px; margin:auto; background:#fff; padding:24px; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,.1);}
  h1{font-size:20px; color:#2f4c8f;}
  table{width:100%; border-collapse:collapse; font-size:14px; margin-top:10px;}
  th,td{border:1px solid #ddd; padding:6px; text-align:center;}
  th{background:#eef1f7;}
  button{margin:6px 6px 0 0; padding:8px 14px; background:#2f4c8f; color:#fff; border:none; border-radius:4px; cursor:pointer;}
  #summary{margin-top:14px; background:#f8f9fc; padding:12px; border-radius:6px; font-size:14px;}
  input[type=file]{margin-top:10px;}
</style>
</head>
<body>
<div class="box">
  <h1>Lab 7.2: ระบบนำเข้า/ส่งออกข้อมูล (JSON)</h1>
  <table>
    <thead><tr><th>ID</th><th>สินค้า</th><th>ราคา</th></tr></thead>
    <tbody id="productTable"></tbody>
  </table>
  <div id="summary"></div>
  <button onclick="exportJSON()">ส่งออก (Export) JSON</button>
  <br>
  <label>นำเข้า (Import) ไฟล์ JSON:</label><br>
  <input type="file" id="fileInput" accept=".json" onchange="importJSON(event)">
</div>

<script>
let products = [
  { id: 1, name: "นาฬิกา", price: 3000 },
  { id: 2, name: "กระเป๋า", price: 1200 },
  { id: 3, name: "รองเท้า", price: 890 },
];

function render() {
  // forEach() - แสดงข้อมูล
  let rows = "";
  products.forEach(p => {
    rows += `<tr><td>${p.id}</td><td>${p.name}</td><td>${p.price}</td></tr>`;
  });
  document.getElementById("productTable").innerHTML = rows;

  // map() - แปลงข้อมูลเป็น array ชื่อสินค้า
  const names = products.map(p => p.name);

  // filter() - กรองสินค้าราคามากกว่า 1000
  const expensive = products.filter(p => p.price > 1000);

  // reduce() - สรุปราคารวม
  const total = products.reduce((sum, item) => sum + item.price, 0);

  document.getElementById("summary").innerHTML = `
    <p><b>รายชื่อสินค้า (map):</b> ${names.join(", ")}</p>
    <p><b>สินค้าราคา > 1000 (filter):</b> ${expensive.map(p=>p.name).join(", ") || "ไม่มี"}</p>
    <p><b>ราคารวมทั้งหมด (reduce):</b> ${total.toLocaleString()} บาท</p>
  `;
}

function exportJSON() {
  const jsonStr = JSON.stringify(products, null, 2); // Object -> JSON string
  const blob = new Blob([jsonStr], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "products.json";
  a.click();
  URL.revokeObjectURL(url);
}

function importJSON(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function (e) {
    try {
      const imported = JSON.parse(e.target.result); // JSON string -> Object
      products = imported;
      render();
      alert("นำเข้าข้อมูลสำเร็จ!");
    } catch (err) {
      alert("ไฟล์ JSON ไม่ถูกต้อง");
    }
  };
  reader.readAsText(file);
}

render();
</script>
</body>
</html>
